{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Hospital System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-section">
                <div class="logo-icon">🏥</div>
                <div class="logo-text">
                    <h2>Smart Hospital</h2>
                    <span>Queue & Bed Management</span>
                </div>
            </div>

            <div class="nav-links">
                <a href="/" class="nav-link">Add Patient</a>
                <a href="/queue/" class="nav-link">Active Queue</a>
                <a href="/history/" class="nav-link">History</a>
                <a href="/beds/" class="nav-link">Beds</a>
                <a href="/admin/" class="nav-link admin-link">Admin</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
